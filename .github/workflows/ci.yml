name: CI
on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: android-actions/setup-android@v3
      - name: Build (debug)
        run: ./gradlew assembleDebug
      - name: Unit tests
        run: ./gradlew test
      - name: Lint
        run: ./gradlew lint
      - name: Verify release DEX has no Apache HTTP references (16 KB-page regression guard)
        run: |
          ./gradlew minifyReleaseWithR8
          DEX_DIR=build/intermediates/dex/release/minifyReleaseWithR8
          shopt -s nullglob
          dex_files=("$DEX_DIR"/*.dex)
          if [ ${#dex_files[@]} -eq 0 ]; then
            echo "::error::No DEX files found under $DEX_DIR"
            exit 1
          fi
          total=0
          for dex in "${dex_files[@]}"; do
            count=$(LC_ALL=C grep -a -o "org/apache/http" "$dex" | wc -l)
            echo "$dex: $count org.apache.http references"
            total=$((total + count))
          done
          if [ "$total" -ne 0 ]; then
            echo "::error::Found $total org.apache.http references in the post-R8 release DEX. This regresses the Android 15/16 KB-page fix — the live code path must not reference Apache HTTP, which was removed from the bootclasspath in API 28."
            exit 1
          fi
          echo "OK: 0 org.apache.http references in release DEX."
      - name: Rename APK to flag it is unsigned for testing
        run: |
          shopt -s nullglob
          apks=(build/outputs/apk/debug/*-debug.apk)
          if [ ${#apks[@]} -eq 0 ]; then
            echo "::error::No *-debug.apk found under build/outputs/apk/debug/"
            ls -la build/outputs/apk/debug/ || true
            exit 1
          fi
          if [ ${#apks[@]} -gt 1 ]; then
            echo "::error::Expected exactly one *-debug.apk, found ${#apks[@]}: ${apks[*]}"
            exit 1
          fi
          mv "${apks[0]}" build/outputs/apk/debug/app-unsigned_for_testing.apk
          echo "Renamed ${apks[0]} -> build/outputs/apk/debug/app-unsigned_for_testing.apk"
      - name: Upload unsigned-for-testing APK
        uses: actions/upload-artifact@v4
        with:
          name: app-unsigned_for_testing
          path: build/outputs/apk/debug/app-unsigned_for_testing.apk
