name: CI
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: android-actions/setup-android@v3
      - name: Build (debug)
        run: ./gradlew assembleDebug
      - name: Unit tests
        run: ./gradlew test
      - name: Lint
        run: ./gradlew lint
      - name: Rename APK to flag it is unsigned for testing
        run: mv build/outputs/apk/debug/app-debug.apk build/outputs/apk/debug/app-unsigned_for_testing.apk
      - name: Upload unsigned-for-testing APK
        uses: actions/upload-artifact@v4
        with:
          name: app-unsigned_for_testing
          path: build/outputs/apk/debug/app-unsigned_for_testing.apk
