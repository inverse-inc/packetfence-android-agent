name: CI
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: android-actions/setup-android@v3
      - name: Build (debug)
        run: ./gradlew assembleDebug
      - name: Unit tests
        run: ./gradlew test
      - name: Lint
        run: ./gradlew lint
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/outputs/apk/debug/*.apk
  release-build:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: android-actions/setup-android@v3
      - name: Decode keystore
        run: |
          echo "${{ secrets.PF_KEYSTORE_BASE64 }}" | base64 -d > /tmp/keystore.jks
      - name: Build signed release
        env:
          PF_KEYSTORE_PATH: /tmp/keystore.jks
          PF_KEYSTORE_PASS: ${{ secrets.PF_KEYSTORE_PASS }}
          PF_KEY_ALIAS:     ${{ secrets.PF_KEY_ALIAS }}
          PF_KEY_PASS:      ${{ secrets.PF_KEY_PASS }}
        run: ./gradlew assembleRelease
      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/outputs/apk/release/*.apk
